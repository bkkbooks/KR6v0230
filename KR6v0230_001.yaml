body:
  text: 之一碑側夫大薩云表挺世之容妙法開敷波若闡權顯之音如來奄過殊遷祀像法雖隆床宗者鮮是以大代永熙二年歲次正月戊子朔八日乙未北雍州宜君郡黃堡縣邑主俊蒙文姬娥合邑子卅一人等自慨丕踰流轉無竊故減割家珍聘名大路顯敞之處敬造石像一區功就成訖令國祚永隆人民洽下願慶七世永超八難神縣福堂濟生死之苦願諸邑子蒙拯衆患消願初首書人夫蒙顯達之二碑側邑子清信瓽高邑子清信楊妙娥邑子清信同𤧛鳳皇姬邑子清信同𤧛標姬邑子清信同𤧛照姬邑子清信同𤧛枝達邑子清信同𤧛真朱伏男邑子清信成定姬邑子清信鉗耳支誠男姬邑子清信同𤧛妙娥邑子清信同𤧛軒朱邑子清信同𤧛標姬邑子清信夫蒙百伏邑子清信之三碑陽惟那清拔連香火清信王蘭小邑謂清信同𤧛雲典録清信同𤧛阿美邑主清信俊蒙文姬邑正清信同𤧛娥媚比丘僧郭僧景名豐洛彈官清信夫蒙妙朱沙彌夫蒙僧貴彈官清信同𤧛天姬邑主清信瓽姬娥邑正清信朱阿儻邑謂清信同𤧛定姜典録清信同𤧛阿陵維那清信同𤧛彌弱香火清信同𤧛磨紙邑子清之四碑陰亡邑子信田文姜邑子同𤧛男亡邑子清信同𤧛文姬邑子夫蒙連亡邑主清信俊蒙阿護承邑子同𤧛亡邑主清信王歸香邑子夫蒙緑花亡惟那清信瓽姬香邑子瓽俗男亡惟那清信同𤧛龍姜邑子荔非貴姬邑子同𤧛道姬邑子想姬邑子王男邑子同𤧛顯妃邑子同𤧛娥花邑子于向妃邑子夫蒙照男邑子雷貴姬邑子同𤧛明月邑子劉雙勝
